<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link href="style.css" rel="stylesheet"/>
    <style></style>
</head>
<body>
    <div id="container">
        <div class="timer-display">
            <div id="time-text">
                <span id="min">👜</span>:<span id="sec">🍵</span>
            </div>
        </div>
        <h1 id="manage">....</h1>
        <div id="controls-wrapper">
            <div id="session-settings">
                <h3>Session Time</h3>
                <span id="time">00 min</span>
                <button id="splus" class="plus">+</button>
                <button id="sminus" class="minus">-</button>
            </div>
            <div id="break-settings">
                <h3>Break Time</h3>
                <span id="break-time">00 min</span>
                <button id="plusb" class="plus">+</button>
                <button id="minusb" class="minus">-</button>
            </div>
        </div>
        <div class="actions">
            <button id="start">START</button>
            <button id="pause" style="display: none">PAUSE</button>
            <button id="reset">RESET</button>
        </div>
    </div>
    <script src="script.js">
       
    </script>
</body>
</html>
